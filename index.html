<div class="detail-section" style="margin-top:20px"><strong>二、史籍信息细节</strong></div>

<div class="detail-section"><strong>（一）史籍基本信息：</strong><br>
《景德传灯录》由北宋苏州承天寺僧人释道原编撰，初名《佛祖同参集》，成书于宋真宗景德年间（1004—1007），为佛教禅宗首部以“灯录”命名的史传著作。道原编成后经杨亿等人勘定，宋真宗敕令编入大藏经流通。</div>

<div class="detail-section"><strong>（二）作者信息：</strong><br>
道原，北宋法眼宗禅僧，属天台德韶法系。系天台韶国师之嗣，法眼清凉益之孙。</div>

<div class="detail-section"><strong>（三）成书年代：</strong><br>
景德三年<br>
相关史料：<br>
据王随《传灯玉英集》后序记载，“文明武定章圣元孝皇帝在宥之九载，有江吴僧道源采七佛而下暨历世高贤尊宿言句，编成传灯录三十轴，诣阙进焉。寻诏名臣刊修臻毕，遂成钜典，模印颁行。”可知释道原《景德传灯录》于宋真宗在位第九年，即景德三年（1006）书成诣阙上进。</div>

<div class="detail-section"><strong>（四）传日时间：</strong><br>
无准确时间，据史料有：熙宁-元丰年间、淳祐年间<br>
相关史料：<br>
据《参天台五台山记》的记载，日本延历寺阿闍梨成寻于后三条延久四年(1072年)由杭州登陆入宋，巡游汴京、天台、五台等，并谒见宋神宗。成寻将从中国得到的经藏，委托给随行的五位弟子，陆续携带归国，本人于宋神宗元丰四年(1081年)卒于汴京开宝寺。宋神宗曾赠送成寻经藏四百十三卷，已被送回日本。其中有《景德传灯录》一部共三十三卷。四条天皇仁治二年(1241年)日本东福寺开山圣一国师圆尔辩圆自中国归，携回汉籍内外文献数千卷。1353年东福寺第二十八世大道一以据圣一国师藏书编纂成《普门院经论章疏语录儒书等目录》。其“宿部”着录《传灯录》一部三十册;其“张部”著录《传灯录》一部五册。</div>

let currentBook = null;

// 回到首页（关闭所有弹窗、清空搜索）
function goHome() {
    document.getElementById("searchInput").value = "";
    document.getElementById("resultLevel1").style.display = "none";
    closeVersionModal();
    closeDetailModal();
    closeGallery();
    closeUpdate();
}

// 检索
function searchBooks() {
    let kw = document.getElementById("searchInput").value.trim();
    let res = document.getElementById("resultLevel1");
    
    if (!kw) {
        res.style.display = "none";
        return;
    }
    
    let list = bookData.filter(b => 
        b.name.includes(kw) || b.author.includes(kw)
    );
    
    res.style.display = "flex";
    res.innerHTML = list.map((b, idx) => `
    <div class="book-item" onclick="openVersionModal(${idx})">
        <div class="book-name">${b.name}</div>
        <div class="book-info">著者：${b.author}｜年代：${b.year}</div>
    </div>
    `).join('');
}

// 打开二级弹窗：版本
function openVersionModal(idx) {
    currentBook = bookData[idx];
    document.getElementById("versionTitle").innerText = currentBook.name;
    document.getElementById("versionList").innerHTML = currentBook.versions.map((v, i) => `
    <div class="version-item">
        <div class="version-label">版本：${v.version}</div>
        <button class="to-detail-btn" onclick="openDetailModal(${i})">查看详细信息</button>
    </div>
    `).join('');
    document.getElementById("versionModal").style.display = "flex";
}

// 打开三级弹窗：详情
function openDetailModal(idx) {
    document.getElementById("detailTitle").innerText = currentBook.name;
    document.getElementById("detailContent").innerHTML = currentBook.versions[idx].detail;
    document.getElementById("detailModal").style.display = "flex";
}

// 关闭弹窗
function closeVersionModal() {
    document.getElementById("versionModal").style.display = "none";
}
function closeDetailModal() {
    document.getElementById("detailModal").style.display = "none";
}

// 图集
function openGallery() {
    document.getElementById("galleryModal").style.display = "flex";
}
function closeGallery() {
    document.getElementById("galleryModal").style.display = "none";
}

// 关闭公告
function closeNotice() {
    document.getElementById("noticeModal").style.display = "none";
}

// 更新公告
function openUpdate() {
    document.getElementById("updateModal").style.display = "flex";
}
function closeUpdate() {
    document.getElementById("updateModal").style.display = "none";
}
