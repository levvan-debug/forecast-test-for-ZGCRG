.detail-section strong {

    color: #222;

    text-align: center;
    font-size: 18px;
    color: #666;
    padding: 60px 0;

function render(list) {
    const box = document.getElementById('list');
    box.innerHTML = list.map((b,i) => `
    <div class="book-item" onclick="openDetail(${i})">
        <div class="book-title">${b.name}</div>
        <div class="book-info">${b.author}｜${b.version}</div>
    </div>
    `).join('');
}

function search() {
    const kw = document.getElementById('search').value.toLowerCase();
    const res = books.filter(b => 
        b.name.toLowerCase().includes(kw) || 
        b.author.toLowerCase().includes(kw) || 
        b.version.toLowerCase().includes(kw) ||
        b.original.toLowerCase().includes(kw) || 
        b.current.toLowerCase().includes(kw)
    );
    render(res);
}

function openDetail(index) {
    const b = books[index];
    if (b.full === "empty") {
        document.getElementById('detail').innerHTML = `
            <div class="detail-title">${b.name}</div>
            <div class="empty-tip">正在更新中……请稍候访问</div>
        `;
    } else {
        document.getElementById('detail').innerHTML = `
            <div class="detail-title">${b.name}</div>
            ${b.full}
        `;
    }
    document.getElementById('modal').style.display = "flex";
}

function closeModal() {
    document.getElementById('modal').style.display = "none";
}

render(books);
